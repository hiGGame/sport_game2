version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sg2-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sport_game2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  spider:
    build:
      context: .
      dockerfile: Dockerfile.spider
    container_name: sg2-spider
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sport_game2
      DB_SSLMODE: disable
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/spider_healthy && test $$(( $$(date +%s) - $$(stat -c %Y /tmp/spider_healthy) )) -lt 180"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: sg2-server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sport_game2
      DB_SSLMODE: disable
      SERVER_MODE: release
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  pgdata:
